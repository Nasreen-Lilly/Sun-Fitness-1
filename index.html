<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sun Fitness Gym — Salem's Premier Fitness Destination</title>
  <meta name="description" content="Sun Fitness Gym in Salem — No 504 Sankari Main Rd, Kalarampatti. Transform your body and mind with world-class equipment, expert trainers, and a motivating community. Call 092456 60666." />
  <meta name="keywords" content="gym Salem, fitness Salem, Sun Fitness Gym, Kalarampatti gym, workout Salem Tamil Nadu" />
  <meta property="og:title" content="Sun Fitness Gym — Salem's Premier Fitness Destination" />
  <meta property="og:description" content="Join Sun Fitness Gym in Salem. Expert trainers, modern equipment, and a results-driven community." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Elegant & Premium Serif Stack -->
  <!-- Cormorant Garamond: ultra-refined display serif for hero titles -->
  <!-- Playfair Display: classic editorial serif for section headings -->
  <!-- Jost: geometric humanist for UI labels, nav, buttons -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sun: #F5A800;
      --sun-hot: #FF6B00;
      --black: #0A0A0A;
      --charcoal: #141414;
      --steel: #1E1E1E;
      --muted: #5A5A5A;
      --white: #F5F0E8;
      --off: #D4CFC6;
      --red: #E8311A;

      /* Font families */
      --font-display: 'Cormorant Garamond', Georgia, serif;   /* Hero titles, big numbers */
      --font-heading: 'Playfair Display', Georgia, serif;     /* Section titles          */
      --font-ui:      'Jost', sans-serif;                     /* Nav, labels, buttons    */
      --font-body:    'Cormorant Garamond', Georgia, serif;   /* Body copy               */
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom Cursor */
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--sun);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 40px; height: 40px;
      border: 1.5px solid var(--sun);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease-out, width 0.3s, height 0.3s, opacity 0.3s;
      opacity: 0.5;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 5vw;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
      backdrop-filter: blur(4px);
      transition: background 0.4s;
    }
    nav.scrolled { background: rgba(10,10,10,0.97); }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 2.8vw, 1.85rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--white);
      text-decoration: none;
      display: flex; align-items: center; gap: 12px;
    }
    .nav-logo .sun-icon {
      width: 30px; height: 30px;
      background: radial-gradient(circle, var(--sun) 40%, var(--sun-hot) 100%);
      border-radius: 50%;
      box-shadow: 0 0 18px var(--sun), 0 0 36px rgba(245,168,0,0.3);
      animation: pulse-sun 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-sun {
      0%,100% { box-shadow: 0 0 18px var(--sun), 0 0 36px rgba(245,168,0,0.3); }
      50% { box-shadow: 0 0 28px var(--sun), 0 0 56px rgba(245,168,0,0.5); }
    }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--off);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--sun);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--sun); }
    .nav-links a:hover::after { width: 100%; }

    .nav-cta {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--sun);
      border: none;
      padding: 10px 22px;
      text-decoration: none;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.2s, transform 0.2s;
      cursor: none;
    }
    .nav-cta:hover { background: var(--sun-hot); transform: scale(1.04); }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: none; background: none; border: none; }
    .hamburger span { width: 26px; height: 2px; background: var(--white); transition: 0.3s; }

    /* HERO */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex; align-items: center;
      padding: 0 5vw;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 70% 50%, rgba(245,168,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(255,107,0,0.06) 0%, transparent 50%),
        linear-gradient(160deg, #0A0A0A 0%, #111111 50%, #0D0D0D 100%);
    }

    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
    }

    .hero-number {
      position: absolute;
      right: 4vw; top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(180px, 28vw, 380px);
      color: transparent;
      -webkit-text-stroke: 1px rgba(245,168,0,0.08);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .hero-content {
      position: relative; z-index: 2;
      max-width: 760px;
    }

    .hero-eyebrow {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--sun);
      margin-bottom: 20px;
      opacity: 0;
      animation: fade-up 0.8s 0.2s forwards;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      display: block; width: 40px; height: 1px;
      background: var(--sun);
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 11vw, 9.5rem);
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: 0.01em;
      color: var(--white);
      opacity: 0;
      animation: fade-up 0.9s 0.4s forwards;
    }
    .hero-title em {
      font-style: italic;
      font-weight: 400;
    }
    .hero-title .accent { color: var(--sun); font-style: italic; }
    .hero-title .stroke {
      -webkit-text-stroke: 1px var(--white);
      color: transparent;
      font-style: italic;
    }

    .hero-sub {
      font-family: var(--font-body);
      font-size: clamp(1.1rem, 1.9vw, 1.3rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.75;
      color: var(--off);
      max-width: 500px;
      margin-top: 28px;
      opacity: 0;
      animation: fade-up 0.9s 0.6s forwards;
    }

    .hero-actions {
      display: flex; flex-wrap: wrap; gap: 16px;
      margin-top: 40px;
      opacity: 0;
      animation: fade-up 0.9s 0.8s forwards;
    }

    .btn-primary {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.76rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--sun);
      border: none;
      padding: 16px 36px;
      text-decoration: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: background 0.25s, transform 0.2s;
      cursor: none;
    }
    .btn-primary:hover { background: var(--sun-hot); transform: translateY(-2px); }

    .btn-outline {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.76rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white);
      background: transparent;
      border: 1px solid rgba(245,240,232,0.3);
      padding: 16px 36px;
      text-decoration: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: border-color 0.25s, color 0.25s, transform 0.2s;
      cursor: none;
    }
    .btn-outline:hover { border-color: var(--sun); color: var(--sun); transform: translateY(-2px); }

    .hero-stats {
      display: flex; gap: 40px; flex-wrap: wrap;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(245,240,232,0.1);
      opacity: 0;
      animation: fade-up 0.9s 1s forwards;
    }
    .stat-item { }
    .stat-num {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 3rem;
      color: var(--sun);
      line-height: 1;
    }
    .stat-label {
      font-family: var(--font-ui);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .scroll-hint {
      position: absolute; bottom: 40px; left: 5vw;
      display: flex; align-items: center; gap: 12px;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fade-up 1s 1.3s forwards;
    }
    .scroll-line {
      width: 50px; height: 1px;
      background: linear-gradient(to right, transparent, var(--muted));
      position: relative; overflow: hidden;
    }
    .scroll-line::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--sun);
      animation: scan 2s 1.5s ease-in-out infinite;
    }
    @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MARQUEE */
    .marquee-wrap {
      background: var(--sun);
      padding: 14px 0;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }
    .marquee-track {
      display: flex;
      gap: 0;
      white-space: nowrap;
      animation: marquee 22s linear infinite;
    }
    .marquee-item {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--black);
      padding: 0 40px;
      display: flex; align-items: center; gap: 20px;
    }
    .marquee-dot { width: 6px; height: 6px; background: var(--black); border-radius: 50%; opacity: 0.4; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* SECTION SHARED */
    section { padding: clamp(60px, 10vw, 120px) 5vw; }

    .section-label {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--sun);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::before { content: ''; display: block; width: 28px; height: 1px; background: var(--sun); }

    .section-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: clamp(2.6rem, 5.5vw, 5rem);
      line-height: 1;
      letter-spacing: 0.01em;
    }

    /* ABOUT */
    #about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 8vw, 100px);
      align-items: center;
    }
    .about-left { }
    .about-desc {
      font-family: var(--font-body);
      font-size: 1.15rem;
      font-style: italic;
      line-height: 1.85;
      color: var(--off);
      margin-top: 28px;
      max-width: 480px;
    }
    .about-features {
      display: flex; flex-direction: column; gap: 16px;
      margin-top: 36px;
    }
    .about-feat {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px;
      border: 1px solid rgba(245,240,232,0.07);
      background: rgba(255,255,255,0.02);
      transition: border-color 0.3s, background 0.3s;
      cursor: default;
    }
    .about-feat:hover { border-color: rgba(245,168,0,0.3); background: rgba(245,168,0,0.04); }
    .feat-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--sun), var(--sun-hot));
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .feat-text strong {
      display: block;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--white);
    }
    .feat-text span {
      font-family: var(--font-ui);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .about-right {
      position: relative;
    }
    .about-visual {
      position: relative;
      aspect-ratio: 4/5;
      background: var(--steel);
      overflow: hidden;
    }
    .about-visual-inner {
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(245,168,0,0.15) 0%, transparent 70%),
        linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    .gym-icon-big {
      font-size: 6rem;
      opacity: 0.15;
    }
    .about-tag {
      position: absolute;
      bottom: -20px; right: -20px;
      background: var(--sun);
      padding: 20px 28px;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }
    .about-tag strong {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 2.6rem;
      color: var(--black);
      line-height: 1;
      display: block;
    }
    .about-tag span {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(10,10,10,0.7);
    }
    .about-deco {
      position: absolute;
      top: -20px; left: -20px;
      width: 80px; height: 80px;
      border-top: 3px solid var(--sun);
      border-left: 3px solid var(--sun);
    }

    /* SERVICES */
    #services { background: var(--charcoal); }
    .services-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 60px;
      flex-wrap: wrap; gap: 20px;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2px;
    }
    .service-card {
      background: var(--steel);
      padding: 40px 32px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: background 0.3s;
    }
    .service-card::before {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(to right, var(--sun), var(--sun-hot));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-card:hover { background: #232323; }

    .service-num {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 3.5rem;
      color: rgba(245,168,0,0.1);
      line-height: 1;
      position: absolute; top: 20px; right: 24px;
    }
    .service-icon-wrap {
      width: 52px; height: 52px;
      border: 1px solid rgba(245,168,0,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 24px;
      transition: border-color 0.3s, background 0.3s;
    }
    .service-card:hover .service-icon-wrap { border-color: var(--sun); background: rgba(245,168,0,0.08); }
    .service-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.03em;
      color: var(--white);
      margin-bottom: 12px;
    }
    .service-desc {
      font-family: var(--font-body);
      font-size: 1rem;
      font-style: italic;
      line-height: 1.75;
      color: var(--muted);
    }

    /* PRICING */
    #pricing { }
    .pricing-header { text-align: center; margin-bottom: 60px; }
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .price-card {
      background: var(--steel);
      border: 1px solid rgba(245,240,232,0.07);
      padding: 40px 32px;
      position: relative;
      transition: transform 0.3s, border-color 0.3s;
      cursor: default;
    }
    .price-card:hover { transform: translateY(-6px); border-color: rgba(245,168,0,0.25); }
    .price-card.featured {
      border-color: var(--sun);
      background: linear-gradient(160deg, #1E1E1E 0%, #1a1600 100%);
    }
    .price-badge {
      position: absolute; top: -1px; right: 32px;
      background: var(--sun);
      color: var(--black);
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 6px 14px;
    }
    .price-plan {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--sun);
      margin-bottom: 16px;
    }
    .price-amount {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 4.2rem;
      line-height: 1;
      color: var(--white);
      margin-bottom: 6px;
    }
    .price-amount span {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--muted);
      vertical-align: top;
      margin-top: 10px;
      display: inline-block;
    }
    .price-period {
      font-family: var(--font-ui);
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: 0.1em;
    }
    .price-perks { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 36px; }
    .price-perks li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--off);
      display: flex; align-items: center; gap: 10px;
    }
    .price-perks li::before { content: '✓'; color: var(--sun); font-weight: 700; font-size: 0.85rem; }
    .price-perks li.no { color: var(--muted); }
    .price-perks li.no::before { content: '—'; color: var(--muted); }

    .btn-plan {
      display: block; width: 100%; text-align: center;
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing:
